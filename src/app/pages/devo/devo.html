<div class="page" *ngIf="devoRes as res; else loading">

  <h1 class="title">Devocional Diario</h1>

  <!-- CONTROLES DE FECHA -->
  <div class="controls-card">
    <button class="icon-btn" (click)="prevDay()">⬅</button>

    <input type="date" [value]="selectedDate" (change)="onDateChange($event)" />

    <button class="icon-btn" (click)="nextDay()">➡</button>

    <button class="today-btn" (click)="goToToday()">Hoy</button>
  </div>

  <!-- TARJETA PRINCIPAL -->
  <div class="card main-card">
    <h2>{{ res.data.title }}</h2>
    <p class="date">{{ res.data.date }}</p>

    <blockquote>
      "{{ res.data.verse }}" — {{ res.data.passage }}
    </blockquote>

    <div class="audio-box">
      <audio [src]="res.data.audioUrl" controls></audio>
      <button class="download-btn" (click)="downloadAudio(res.data.audioUrl)">
        ⬇ Descargar audio
      </button>
    </div>
  </div>

  <!-- PREVIEWS -->
  <div class="preview-grid">

    <div class="preview-card whatsapp">
      <h3>Vista WhatsApp</h3>
      <div class="scroll-box">{{ res.formatWhatsapp }}</div>

      <div class="btn-row">
        <button class="btn copy" (click)="copyToClipboard(res.formatWhatsapp)">Copiar</button>
        <button class="btn wa" (click)="shareWhatsApp(res.formatWhatsapp)">Enviar</button>
      </div>
    </div>

    <div class="preview-card web">
      <h3>Vista Web</h3>
      <div class="scroll-box">{{ res.formatWeb }}</div>

      <div class="btn-row">
        <button class="btn copy" (click)="copyToClipboard(res.formatWeb)">Copiar</button>
        
    </div>
    </div>

  </div>

</div>

<ng-template #loading>
  <p class="loading">Cargando devocional...</p>
</ng-template>
