<div class="bg-white border border-amber-200 rounded-2xl shadow-md p-6 space-y-6 transition hover:shadow-lg">

    <!-- título -->
    <div class="space-y-1">

        <h2 class="text-2xl font-bold text-gray-800 leading-tight">
            {{ devo.title }}
        </h2>

        <div class="flex items-center gap-2 text-sm text-amber-700">

            <lucide-icon name="calendar-days" class="w-4 h-4"></lucide-icon>

            {{ devo.date }}

        </div>

    </div>

    <!-- versículo -->
    <blockquote class="bg-amber-50 border-l-4 border-amber-500 pl-4 pr-3 py-3 rounded-r-lg italic text-gray-700">

        {{ devo.verse }}

    </blockquote>

    <!-- audio -->

    <div class="space-y-2">

        <div class="flex items-center gap-2 text-gray-600 text-sm">

            <lucide-icon name="volume-2" class="w-4 h-4 text-amber-600"></lucide-icon>

            Audio del devocional

        </div>

        <audio class="w-full" [src]="devo.audioUrl" controls>
        </audio>

    </div>

    <!-- descarga -->

    <div class="flex justify-end">

        <button (click)="downloadAudio(devo.audioUrl)"
            class="flex items-center gap-2 bg-amber-500 text-white px-4 py-2 rounded-lg hover:bg-amber-600 transition shadow-sm">

            <lucide-icon name="download" class="w-4 h-4"></lucide-icon>

            Descargar audio

        </button>

    </div>

</div>
